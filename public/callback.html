<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genrefy — Bağlanıyor...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d14; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; max-width: 400px; padding: 24px; }
    .spinner { width: 48px; height: 48px; border: 4px solid #1a1a2e; border-top-color: #1db954; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 22px; margin-bottom: 8px; }
    p { color: #6b6b80; font-size: 14px; }
    .error-box { display: none; background: #1a1a2e; border: 1px solid #ff4757; border-radius: 12px; padding: 24px; margin-top: 24px; }
    .error-box h3 { color: #ff4757; margin-bottom: 8px; }
    .error-box p { color: #a0a0b8; }
    .btn-retry { display: inline-block; margin-top: 16px; padding: 10px 24px; background: #1db954; color: #fff; border: none; border-radius: 50px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <h2 id="statusTitle">Spotify'a bağlanılıyor...</h2>
    <p id="statusText">Token alınıyor, lütfen bekleyin.</p>
    <div class="error-box" id="errorBox">
      <h3>Bağlantı Hatası</h3>
      <p id="errorText"></p>
      <a href="/" class="btn-retry">Tekrar Dene</a>
    </div>
  </div>
  <script>
    const CLIENT_ID = '923a56a02f15402493d014c52d7da4d6';
    const REDIRECT_URI = window.location.origin + '/callback.html';
    async function handleCallback() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const state = params.get('state');
      const error = params.get('error');
      if (error) { showError('Spotify yetkilendirme reddedildi: ' + error); return; }
      if (!code) { showError('Yetkilendirme kodu bulunamadı.'); return; }
      const savedState = sessionStorage.getItem('auth_state');
      if (state !== savedState) { showError('Güvenlik doğrulaması başarısız (state mismatch).'); return; }
      const codeVerifier = sessionStorage.getItem('code_verifier');
      if (!codeVerifier) { showError('PKCE doğrulayıcı bulunamadı. Lütfen tekrar giriş yapın.'); return; }
      try {
        const response = await fetch('https://accounts.spotify.com/api/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ client_id: CLIENT_ID, grant_type: 'authorization_code', code, redirect_uri: REDIRECT_URI, code_verifier: codeVerifier })
        });
        if (!response.ok) { const e = await response.json().catch(()=>({})); throw new Error(e.error_description || 'Token alınamadı (HTTP ' + response.status + ')'); }
        const data = await response.json();
        sessionStorage.setItem('access_token', data.access_token);
        sessionStorage.setItem('refresh_token', data.refresh_token || '');
        sessionStorage.setItem('token_expiry', Date.now() + (data.expires_in * 1000));
        sessionStorage.removeItem('code_verifier');
        sessionStorage.removeItem('auth_state');
        document.getElementById('statusTitle').textContent = 'Bağlantı başarılı!';
        document.getElementById('statusText').textContent = 'Yönlendiriliyorsunuz...';
        setTimeout(() => { window.location.href = '/app.html'; }, 500);
      } catch (err) { showError(err.message); }
    }
    function showError(msg) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('statusTitle').style.display = 'none';
      document.getElementById('statusText').style.display = 'none';
      document.getElementById('errorBox').style.display = 'block';
      document.getElementById('errorText').textContent = msg;
    }
    handleCallback();
  </script>
</body>
</html>
