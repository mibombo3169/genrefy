<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genrefy — Analiz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d14; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif; min-height: 100vh; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: rgba(13,13,20,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #1a1a2e; position: sticky; top: 0; z-index: 100; }
    .header-logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #1db954, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .user-name { font-size: 14px; color: #a0a0b8; font-weight: 500; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: #1a1a2e; object-fit: cover; }
    .btn-logout { background: none; border: 1px solid #2a2a3e; color: #6b6b80; padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .btn-logout:hover { border-color: #ff4757; color: #ff4757; }
    .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 69px); padding: 32px; }
    .loading-icon { font-size: 48px; margin-bottom: 24px; }
    .loading-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .loading-subtitle { color: #6b6b80; font-size: 14px; margin-bottom: 32px; }
    .progress-container { width: 100%; max-width: 400px; background: #1a1a2e; border-radius: 12px; overflow: hidden; height: 8px; margin-bottom: 12px; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #1db954, #8b5cf6); border-radius: 12px; transition: width 0.4s ease; width: 0%; }
    .progress-text { font-size: 13px; color: #6b6b80; }
    .error-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 69px); padding: 32px; text-align: center; }
    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-title { font-size: 22px; font-weight: 700; color: #ff4757; margin-bottom: 8px; }
    .error-message { color: #a0a0b8; font-size: 14px; max-width: 500px; line-height: 1.6; margin-bottom: 24px; }
    .btn-action { display: inline-block; padding: 12px 28px; background: #1db954; color: #fff; border: none; border-radius: 50px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.2s; }
    .btn-action:hover { background: #1ed760; transform: translateY(-1px); }
    .results-screen { display: none; padding: 32px; max-width: 1400px; margin: 0 auto; }
    .stats-bar { display: flex; gap: 24px; margin-bottom: 32px; flex-wrap: wrap; }
    .stat-item { background: #1a1a2e; border-radius: 12px; padding: 16px 24px; flex: 1; min-width: 140px; text-align: center; }
    .stat-number { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #1db954, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-label { font-size: 12px; color: #6b6b80; margin-top: 4px; }
    .genre-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
    .genre-card { background: #12121e; border: 1px solid #1a1a2e; border-radius: 16px; overflow: hidden; transition: all 0.3s ease; }
    .genre-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); border-color: var(--genre-color); }
    .genre-card-header { padding: 20px 24px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1a1a2e; }
    .genre-card-title { display: flex; align-items: center; gap: 10px; }
    .genre-emoji { font-size: 28px; }
    .genre-name { font-size: 20px; font-weight: 700; }
    .genre-count { background: var(--genre-color); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; }
    .genre-songs { padding: 12px 16px; max-height: 360px; overflow-y: auto; }
    .genre-songs::-webkit-scrollbar { width: 4px; }
    .genre-songs::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 4px; }
    .song-item { display: flex; align-items: center; gap: 12px; padding: 8px; border-radius: 8px; transition: background 0.2s; }
    .song-item:hover { background: #1a1a2e; }
    .song-cover { width: 44px; height: 44px; border-radius: 6px; background: #1a1a2e; object-fit: cover; flex-shrink: 0; }
    .song-info { flex: 1; min-width: 0; }
    .song-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-artist { font-size: 12px; color: #6b6b80; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-link { flex-shrink: 0; color: #1db954; text-decoration: none; font-size: 18px; opacity: 0; transition: opacity 0.2s; }
    .song-item:hover .song-link { opacity: 1; }
    @media (max-width: 600px) { .header { padding: 12px 16px; } .results-screen { padding: 16px; } .genre-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="header">
    <div style="display:flex;align-items:center;gap:12px"><span style="font-size:22px">🎵</span><span class="header-logo">Genrefy</span></div>
    <div class="header-right">
      <span class="user-name" id="userName"></span>
      <img class="user-avatar" id="userAvatar" src="" alt="" style="display:none">
      <button class="btn-logout" onclick="logout()">Çıkış</button>
    </div>
  </div>
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-icon">🔍</div>
    <div class="loading-title" id="loadingTitle">Şarkılar yükleniyor...</div>
    <div class="loading-subtitle" id="loadingSubtitle">Spotify kütüphanenden şarkılar çekiliyor</div>
    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">Hazırlanıyor...</div>
  </div>
  <div class="error-screen" id="errorScreen">
    <div class="error-icon">😕</div>
    <div class="error-title" id="errorTitle">Bir Hata Oluştu</div>
    <div class="error-message" id="errorMessage"></div>
    <button class="btn-action" onclick="window.location.href='/'">Ana Sayfaya Dön</button>
  </div>
  <div class="results-screen" id="resultsScreen">
    <div class="stats-bar" id="statsBar"></div>
    <div class="genre-grid" id="genreGrid"></div>
  </div>
  <script>
    const GENRE_CONFIG = {
      'Pop':{emoji:'🎤',color:'#ff6b9d'},'Rock':{emoji:'🎸',color:'#e74c3c'},'Hip-Hop':{emoji:'🎤',color:'#f39c12'},
      'R&B':{emoji:'🎵',color:'#9b59b6'},'Electronic':{emoji:'🎹',color:'#00d2ff'},'Jazz':{emoji:'🎷',color:'#e67e22'},
      'Classical':{emoji:'🎻',color:'#bdc3c7'},'Country':{emoji:'🤠',color:'#d4a76a'},'Latin':{emoji:'💃',color:'#ff4757'},
      'Metal':{emoji:'🤘',color:'#636e72'},'Folk':{emoji:'🪕',color:'#a29bfe'},'Indie':{emoji:'🌙',color:'#fd79a8'},
      'Soul':{emoji:'✨',color:'#fdcb6e'},'Blues':{emoji:'🎺',color:'#74b9ff'},'Reggae':{emoji:'🟢',color:'#00b894'},
      'Punk':{emoji:'⚡',color:'#d63031'},'Alternative':{emoji:'🔮',color:'#6c5ce7'},'Dance':{emoji:'💃',color:'#e84393'},
      'K-Pop':{emoji:'🇰🇷',color:'#fd79a8'},'Other':{emoji:'🎶',color:'#636e72'}
    };
    const accessToken = sessionStorage.getItem('access_token');
    if (!accessToken) window.location.href = '/';
    let allTracks = [];
    async function init() {
      try {
        await loadUserProfile();
        updateProgress(10,'Şarkılar çekiliyor...',"Beğenilen şarkılar Spotify'dan alınıyor");
        await fetchLikedTracks();
        if (allTracks.length === 0) { showError('Beğenilen Şarkı Bulunamadı','Spotify kütüphanende beğenilen şarkı yok.'); return; }
        updateProgress(40,'AI analiz ediliyor...',allTracks.length+' şarkı Claude AI ile sınıflandırılıyor');
        const genres = await analyzeWithClaude();
        updateProgress(90,'Sonuçlar hazırlanıyor...','Genre kartları oluşturuluyor');
        renderResults(genres);
      } catch(err) { console.error(err); showError('İşlem Başarısız', err.message||'Beklenmeyen bir hata oluştu.'); }
    }
    async function loadUserProfile() {
      const res = await spotifyFetch('https://api.spotify.com/v1/me');
      const user = await res.json();
      document.getElementById('userName').textContent = user.display_name||user.id;
      if (user.images&&user.images.length>0) { const a=document.getElementById('userAvatar'); a.src=user.images[0].url; a.style.display='block'; }
    }
    async function fetchLikedTracks() {
      let offset=0; const maxTracks=200;
      while(offset<maxTracks) {
        const res = await spotifyFetch('https://api.spotify.com/v1/me/tracks?limit=50&offset='+offset);
        const data = await res.json();
        if (!data.items||data.items.length===0) break;
        for(const item of data.items) {
          if(allTracks.length>=maxTracks) break;
          const t=item.track; if(!t) continue;
          allTracks.push({ id:allTracks.length+1, name:t.name, artist:t.artists.map(a=>a.name).join(', '),
            cover:t.album.images&&t.album.images.length>0?(t.album.images.find(i=>i.width<=300)||t.album.images[t.album.images.length-1]).url:'',
            spotifyUrl:t.external_urls?t.external_urls.spotify:'' });
        }
        updateProgress(10+Math.min(30,(allTracks.length/maxTracks)*30),'Şarkılar çekiliyor...',allTracks.length+' şarkı yüklendi');
        if(data.items.length<50||allTracks.length>=maxTracks) break;
        offset+=50;
      }
    }
    async function analyzeWithClaude() {
      const batchSize=100; const batches=[];
      for(let i=0;i<allTracks.length;i+=batchSize) batches.push(allTracks.slice(i,i+batchSize));
      let allResults=[];
      for(let b=0;b<batches.length;b++) {
        const batch=batches[b];
        const songList=batch.map(t=>t.id+'. "'+t.name+'" by '+t.artist).join('\n');
        updateProgress(40+((b+1)/batches.length)*45,'AI analiz ediliyor...','Batch '+(b+1)+'/'+batches.length+' işleniyor');
        const res=await fetch('/.netlify/functions/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({songs:songList})});
        if(!res.ok) { const e=await res.text(); throw new Error('Claude API hatası: '+e); }
        allResults=allResults.concat(await res.json());
      }
      const genreMap={};
      for(const result of allResults) {
        const track=allTracks.find(t=>t.id===result.id); if(!track) continue;
        const genre=result.genre||'Other';
        if(!genreMap[genre]) genreMap[genre]=[];
        genreMap[genre].push(track);
      }
      return genreMap;
    }
    function renderResults(genreMap) {
      document.getElementById('loadingScreen').style.display='none';
      document.getElementById('resultsScreen').style.display='block';
      const sorted=Object.entries(genreMap).sort((a,b)=>b[1].length-a[1].length);
      const topGenre=sorted[0];
      document.getElementById('statsBar').innerHTML='<div class="stat-item"><div class="stat-number">'+allTracks.length+'</div><div class="stat-label">Toplam Şarkı</div></div><div class="stat-item"><div class="stat-number">'+sorted.length+'</div><div class="stat-label">Genre Bulundu</div></div><div class="stat-item"><div class="stat-number">'+(topGenre?topGenre[0]:'-')+'</div><div class="stat-label">En Çok Dinlenen</div></div><div class="stat-item"><div class="stat-number">'+(topGenre?topGenre[1].length:0)+'</div><div class="stat-label">#1 Genre Şarkı</div></div>';
      const grid=document.getElementById('genreGrid'); grid.innerHTML='';
      for(const [genre,tracks] of sorted) {
        const cfg=GENRE_CONFIG[genre]||GENRE_CONFIG['Other'];
        const card=document.createElement('div'); card.className='genre-card'; card.style.setProperty('--genre-color',cfg.color);
        card.innerHTML='<div class="genre-card-header"><div class="genre-card-title"><span class="genre-emoji">'+cfg.emoji+'</span><span class="genre-name">'+escapeHtml(genre)+'</span></div><span class="genre-count" style="background:'+cfg.color+'">'+tracks.length+'</span></div><div class="genre-songs">'+tracks.map(t=>'<div class="song-item">'+(t.cover?'<img class="song-cover" src="'+t.cover+'" loading="lazy">':'')+'<div class="song-info"><div class="song-title">'+escapeHtml(t.name)+'</div><div class="song-artist">'+escapeHtml(t.artist)+'</div></div>'+(t.spotifyUrl?'<a class="song-link" href="'+t.spotifyUrl+'" target="_blank">▶</a>':'')+'</div>').join('')+'</div>';
        grid.appendChild(card);
      }
    }
    function updateProgress(pct,title,subtitle) {
      document.getElementById('progressBar').style.width=pct+'%';
      document.getElementById('loadingTitle').textContent=title;
      document.getElementById('loadingSubtitle').textContent=subtitle;
      document.getElementById('progressText').textContent=Math.round(pct)+'%';
    }
    function showError(title,message) {
      document.getElementById('loadingScreen').style.display='none';
      document.getElementById('errorScreen').style.display='flex';
      document.getElementById('errorTitle').textContent=title;
      document.getElementById('errorMessage').textContent=message;
    }
    async function spotifyFetch(url) {
      const res=await fetch(url,{headers:{'Authorization':'Bearer '+accessToken}});
      if(res.status===401){sessionStorage.clear();window.location.href='/';throw new Error('Oturum süresi doldu');}
      if(!res.ok) throw new Error('Spotify API hatası: HTTP '+res.status);
      return res;
    }
    function escapeHtml(text){const d=document.createElement('div');d.textContent=text;return d.innerHTML;}
    function logout(){sessionStorage.clear();window.location.href='/';}
    init();
  </script>
</body>
</html>
